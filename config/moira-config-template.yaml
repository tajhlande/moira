# MOiRA Configuration Template
#
# Copy this file to moira-config.yaml and edit it.
# Set MOIRA_CONFIG_FILE to point to your moira-config.yaml before starting the app.
#
# NOTE: This template will mutate across phases as new features are built.
# If you edited your config in a prior phase, you may need to re-merge
# against the updated template after upgrading.

# --- Database ---
# Override the database directory with MOIRA_DATA_DIR env var.
# If set, the database file is $MOIRA_DATA_DIR/moira.db and sqlite_path below is ignored.
database:
  sqlite_path: ./data/moira.db
  lancedb_path: ./data/vectors

# --- Budget (consumed by Phase 2 workflow) ---

budget:
  default_limit: 60
  cost_weights:
    decomposition: 2
    tool_identification: 1
    planning: 2
    research: 10
    synthesis: 5
    research_review: 3
    evaluation: 5
    report_generation: 3  # budget-exempt: tracked for accounting, never gates execution
  # Retry limits are also configurable via system settings (retry.max_review,
  # retry.max_evaluation). Settings take precedence over these file values.
  retry_limits:
    max_review: 3       # max research_review cycles per evaluation cycle
    max_evaluation: 2   # max evaluation cycles per research run

# --- Inference ---

inference:
  providers:
    - name: local
      base_url: "http://localhost:8080/v1"
      # API keys can be provided here or via MOIRA_API_KEY_{NAME} env vars.
      # For example, MOIRA_API_KEY_LOCAL for the provider named "local".
      # Env vars take precedence over this value.
      api_key: ""
      # provider_type identifies the API dialect of this server.
      # "completions" = OpenAI Chat Completions (vLLM, llama.cpp, OpenAI)
      # "responses"   = OpenAI Responses API (not yet implemented)
      # "messages"    = Anthropic Messages API (not yet implemented)
      provider_type: "completions"
      # Per-model capability flags. Same model ID on different servers
      # can have different capabilities depending on the chat template.
      # models:
      #   - id: "Qwen3.6-35B-A3B"
      #     native_tool_calling: true
      #   - id: "Qwen3.5-2B-No-Thinking"
      #     native_tool_calling: false  # default
  models:
    intelligence_endpoint: ""  # provider name
    intelligence_model: ""     # model ID
    task_endpoint: ""          # provider name
    task_model: ""             # model ID

# --- Embeddings (Phase 2) ---

embedding:
  provider: local  # local | openai_compatible
  model: all-MiniLM-L6-v2
  # For openai_compatible:
  # endpoint: "http://localhost:8080/v1"
  # model: text-embedding-small

# --- Tools (Phase 2) ---

tools: []
  # - name: web_search
  #   description: "Search the web for information"
  #   endpoint: "https://api.example.com/search"
  #   method: POST
  #   argument_schema:
  #     type: object
  #     properties:
  #       query:
  #         type: string
  #     required: [query]
  #   tags: [web, search]
  #   reliability: high

# Built-in tools (web_search, url_content, calculator) are seeded
# automatically. To configure the web_search tool's SearXNG instance,
# set the searxng_base_url in the tool's config via the API:
#
#   PATCH /api/tools/web_search
#   { "config": { "searxng_base_url": "http://localhost:8888" } }

# --- MCP Servers (Phase 3) ---

mcp_servers: []
  # - name: filesystem
  #   address: "http://localhost:3001"

# --- Application ---

app:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:5173"
